name: CI

on:
  push:
    branches: [dev, main]
    paths:
      - 'apps/vscode-extension/**'
      - 'apps/orm/src/parser/**'
      - 'apps/orm/src/formatter/**'
      - 'apps/orm/src/resolver/**'
      - 'apps/orm/src/types/**'
      - 'apps/orm/src/cli/config/types.ts'
      - 'apps/orm/src/cli/validators/**'
  pull_request:
    branches: [dev]
    paths:
      - 'apps/vscode-extension/**'
      - 'apps/orm/src/parser/**'
      - 'apps/orm/src/formatter/**'
      - 'apps/orm/src/resolver/**'
      - 'apps/orm/src/types/**'
      - 'apps/orm/src/cli/config/types.ts'
      - 'apps/orm/src/cli/validators/**'

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: apps/vscode-extension
      - run: bun run build
        working-directory: apps/vscode-extension
      - run: bun test tests/unit/
        working-directory: apps/vscode-extension
      - run: bun test tests/grammar/
        working-directory: apps/vscode-extension
