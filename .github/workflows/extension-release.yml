name: Extension Release

on:
  push:
    tags: ['ext-v*']
  workflow_dispatch:

concurrency:
  group: ext-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/vscode-extension

      - name: Verify version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/ext-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"
        working-directory: apps/vscode-extension

      - name: Build
        run: bun run build
        working-directory: apps/vscode-extension

      - name: Run tests
        run: bun run test
        working-directory: apps/vscode-extension

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies
        working-directory: apps/vscode-extension

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/ext-v}"
          MINOR=$(echo "$VERSION" | cut -d. -f1-2 | tr '.' '/')
          gh release create "$GITHUB_REF_NAME" \
            --title "Cerial VS Code Extension v$VERSION" \
            --notes "Full release notes: https://cerial-orm.github.io/releases/extension/${MINOR}#$(echo $VERSION | tr '.' '')" \
            apps/vscode-extension/*.vsix

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/')
        run: npx @vscode/vsce publish --no-dependencies --pat ${{ secrets.VSCE_PAT }}
        working-directory: apps/vscode-extension
